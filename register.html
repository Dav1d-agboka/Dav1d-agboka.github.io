<!DOCTYPE html>
<html>
    <head>
        <title>SignUp</title>
        <link rel="stylesheet" src="register.css">
    </head>
    <body>
        <form align="center">
            <fieldset>
                <p><h1>SignUp<hr></h1></p>
                <fieldset>
                    <legend>Username</legend>
                    <p>First Name: <input type="text" name="customer_name" size="20" id="name" required></p>
                    <p>Last Name: <input type="text" name="customer_name" size="20" id="name" required></p>
                </fieldset>
                <fieldset>
                    <legend>Personal Info.</legend>
                    <p>Email: <input type="email" id="mail" name="user_email" required></p>
                    <p>Password: <input type="password" id="password" name="user_password" required></p>
                    <p>Confirm Password: <input type="password" id="password" name="user_password" required></p>
                    <p>Phone Number: <input type="number" id="number" name="user_number" required></p>
                    <p>Secret Code: <input type="number" id="number" name="user_pin" required></p>
                    <p>Date of birth: <input type="datetime-local" name="user_dateofbirth" required></p>
                    <p>Age: <input type="age" id="age" name="user_age" required></p>
                    Male <input type="radio" id="sex" name="d-sex">       --------- Female <input type="radio" id="sex" name="d-sex">
                </fieldset>
                <p>I already have an account <a href="login.html">Login</a></p>
                <p><input type="checkbox" id="accept" name="condition"> I accept the terms & conditions</p>
                <p><input type="submit" value="SignUp"></p>
            </fieldset>
        </form>
    </body>
</html>
